name: Monthly Grocery Deployment in EC2 with Docker-Compose

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          echo "${{ secrets.AWS_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          
          ssh -o StrictHostKeyChecking=no -i private_key.pem ${{ secrets.AWS_USER }}@${{ secrets.AWS_HOST }} \
          "REMOTE_HOST=${{ secrets.AWS_HOST }}" 'bash -s'<< 'EOF'
            if [ ! -d "~/grocery-management" ]; then
              echo "Project folder not found. Cloning..."
              git clone https://github.com/ripon1995/grocery-management.git ~/grocery-management
            fi
            cd ~/grocery-management || exit
            git pull origin main
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > backend/.env
            echo "LOG_LEVEL=${{ secrets.LOG_LEVEL }}" >> backend/.env
            echo "ENVIRONMENT=${{ secrets.ENVIRONMENT }}" >> backend/.env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> backend/.env
            echo "SHOW_SQL_LOG=${{ secrets.SHOW_SQL_LOG }}" >> backend/.env
            echo "ALLOW_ORIGINS=[\"http://$REMOTE_HOST:3000\"]" >> backend/.env
            echo "VITE_API_BASE_URL=http://$REMOTE_HOST:8000/" > frontend/.env
            
            docker compose down
            docker compose up -d --build
            docker image prune -f
          EOF